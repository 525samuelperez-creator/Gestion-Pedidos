{% extends "pedidos/base.html" %}

{% block title %}Registro de Usuario{% endblock %}

{% block content %}
<style>
    .auth-form input {
        width: 100%;
        padding: 0.375rem 0.75rem;
        margin-bottom: 1rem;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
        display: block;
    }
    .auth-form span.helptext {
        font-size: 0.8em;
        color: #6c757d;
        display: block;
        margin-top: -0.8rem;
        margin-bottom: 1rem;
    }
    .auth-form ul.errorlist {
        color: #dc3545;
        list-style-type: none;
        padding-left: 0;
        font-size: 0.9em;
        margin-bottom: 1rem;
    }
</style>
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white text-center py-3">
                <h4 class="mb-0">Crear una Cuenta</h4>
            </div>
            <div class="card-body p-4 auth-form">
                <form method="post" action="{% url 'registro' %}">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg">Registrarse</button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3">
                <span class="text-muted">¿Ya tienes una cuenta?</span> 
                <a href="{% url 'login' %}" class="text-decoration-none fw-bold text-success">Inicia sesión aquí</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
